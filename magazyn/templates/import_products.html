{% extends "base.html" %}

{% block content %}
<form action="{{ url_for('products.import_products') }}" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-3 md:w-1/2 mx-auto">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-auto">
        <input type="file" name="file" required class="file-input file-input-bordered w-full">
    </div>
    <div class="col-span-1 md:col-span-2 form-actions text-center">
        <button type="submit" class="btn btn-primary">Zaimportuj</button>
    </div>
</form>
{% endblock %}
