{% extends "base.html" %}
{% block content %}
<h2 class="mb-3 text-center">Test wydruku</h2>
<form method="post" class="mb-3 grid grid-cols-1 md:grid-cols-2 gap-3 md:w-1/2 mx-auto">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-span-12 form-actions text-center">
        <button type="submit" class="btn btn-primary">Wydrukuj stronę testową</button>
    </div>
</form>
{% if message %}
<p>{{ message }}</p>
{% endif %}
{% endblock %}
