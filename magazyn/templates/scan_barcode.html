{% extends "base.html" %}
{% block page_vars %}
    {% set barcode_mode = 'product' %}
    {% set barcode_endpoint = url_for('scanning.barcode_scan') %}
{% endblock %}
{% block content %}
    <div class="container mx-auto text-center">
        <h2 class="mb-4">Skanuj kod kreskowy</h2>
        <p class="lead">Przyłóż czytnik kodów kreskowych do produktu lub wpisz kod ręcznie.</p>
        <form id="barcode-form" class="flex flex-wrap justify-center gap-4">
            <div class="w-full md:w-1/2">
                <label for="barcode-input" class="label-text sr-only">Kod kreskowy</label>
                <input type="text"
                       id="barcode-input"
                       class="input input-bordered input-lg w-full text-center"
                       placeholder="Przyłóż czytnik lub wpisz kod"
                       autocomplete="off"
                       data-barcode-source="manual">
            </div>
        </form>
        <div class="alert alert-success mt-4 hidden" data-barcode-result></div>
        <div class="alert alert-error mt-4 hidden" data-barcode-error></div>
    </div>
{% endblock %}
