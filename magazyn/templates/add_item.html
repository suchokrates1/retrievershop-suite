{% extends "base.html" %}

{% block content %}
<h2 class="mb-3 text-center">Dodaj nowy przedmiot</h2>
    <form action="{{ url_for('products.add_item') }}" method="post" class="grid grid-cols-12 gap-3 w-full" x-data="{ selectedColor: 'Czerwony', sizingMode: 'sized', categoryChoice: '{{ product_categories[0] if product_categories else '' }}', brandChoice: {% if 'Truelove' in product_brands %}'Truelove'{% elif product_brands %}'{{ product_brands[0]|e }}'{% else %}''{% endif %}, seriesChoice: '' }">
        {{ form.csrf_token }}
        
        <div class="col-span-12 md:col-span-4">
            <label for="category" class="label-text">Kategoria:</label>
            <select id="category" name="category" required class="select select-bordered w-full" x-model="categoryChoice">
                {% for cat in product_categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
                <option value="{{ new_taxonomy_value }}">+ Nowa kategoria...</option>
            </select>
            <div class="mt-2" x-show="categoryChoice === '{{ new_taxonomy_value }}'" x-cloak>
                <input type="text" name="custom_category" class="input input-bordered w-full" placeholder="Wpisz nową kategorię" :required="categoryChoice === '{{ new_taxonomy_value }}'">
            </div>
        </div>

        <div class="col-span-12 md:col-span-4">
            <label for="brand" class="label-text">Marka:</label>
            <select id="brand" name="brand" class="select select-bordered w-full" x-model="brandChoice">
                {% for brand in product_brands %}
                <option value="{{ brand }}">{{ brand }}</option>
                {% endfor %}
                <option value="{{ new_taxonomy_value }}">+ Nowa marka...</option>
            </select>
            <div class="mt-2" x-show="brandChoice === '{{ new_taxonomy_value }}'" x-cloak>
                <input type="text" name="custom_brand" class="input input-bordered w-full" placeholder="Wpisz nową markę" :required="brandChoice === '{{ new_taxonomy_value }}'">
            </div>
        </div>

        <div class="col-span-12 md:col-span-4">
            <label for="series" class="label-text">Seria:</label>
            <select id="series" name="series" class="select select-bordered w-full" x-model="seriesChoice">
                <option value="">-- Brak serii --</option>
                {% for ser in product_series %}
                <option value="{{ ser }}">{{ ser }}</option>
                {% endfor %}
                <option value="{{ new_taxonomy_value }}">+ Nowa seria...</option>
            </select>
            <div class="mt-2" x-show="seriesChoice === '{{ new_taxonomy_value }}'" x-cloak>
                <input type="text" name="custom_series" class="input input-bordered w-full" placeholder="Wpisz nową serię" :required="seriesChoice === '{{ new_taxonomy_value }}'">
            </div>
        </div>

        <div class="col-span-12 md:col-span-6">
            <label for="color" class="label-text">Kolor:</label>
            <select id="color" name="color" required class="select select-bordered w-full" x-model="selectedColor">
                <option value="Czerwony">Czerwony</option>
                <option value="Niebieski">Niebieski</option>
                <option value="Zielony">Zielony</option>
                <option value="Czarny">Czarny</option>
                <option value="Biały">Biały</option>
                <option value="Brązowy">Brązowy</option>
                <option value="Różowy">Różowy</option>
                <option value="Fioletowy">Fioletowy</option>
                <option value="Srebrny">Srebrny</option>
                <option value="Pomarańczowy">Pomarańczowy</option>
                <option value="Turkusowy">Turkusowy</option>
                <option value="Żółty">Żółty</option>
                <option value="Szary">Szary</option>
                <option value="Złoty">Złoty</option>
                <option value="Beżowy">Beżowy</option>
                <option value="Khaki">Khaki</option>
                <option value="Bordowy">Bordowy</option>
                <option value="Granatowy">Granatowy</option>
                <option value="Kremowy">Kremowy</option>
                <option value="Inny">Inny (wpisz poniżej)</option>
            </select>
        </div>

        <div class="col-span-12 md:col-span-6" x-show="selectedColor === 'Inny'" x-cloak>
            <label for="custom_color" class="label-text">Niestandardowy kolor:</label>
            <input type="text" id="custom_color" name="custom_color" class="input input-bordered w-full" placeholder="Wpisz kolor" :required="selectedColor === 'Inny'">
        </div>

        <div class="col-span-12 md:col-span-4">
            <label for="sizing_mode" class="label-text">Typ rozmiarów:</label>
            <select id="sizing_mode" name="sizing_mode" class="select select-bordered w-full" x-model="sizingMode">
                <option value="sized">Rozmiarowy (XS–3XL)</option>
                <option value="universal">Jeden rozmiar (Uniwersalny)</option>
            </select>
        </div>


        {% for size in ALL_SIZES %}
            <div class="col-span-12" x-show="sizingMode === '{{ 'universal' if size == 'Uniwersalny' else 'sized' }}'" x-cloak>
                <label class="label-text">Rozmiar: {{ size }}</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <div>
                        <input type="number" id="quantity_{{ size }}" name="quantity_{{ size }}" min="0" value="0" class="input input-bordered w-full" placeholder="Ilość">
                    </div>
                    <div>
                        <input type="text" id="barcode_{{ size }}" name="barcode_{{ size }}" class="input input-bordered w-full" placeholder="Kod kreskowy">
                    </div>
                </div>
            </div>
        {% endfor %}

        <div class="col-span-12 form-actions text-center">
            <button type="submit" class="btn btn-primary">Dodaj przedmiot</button>
        </div>
    </form>


{% endblock %}
