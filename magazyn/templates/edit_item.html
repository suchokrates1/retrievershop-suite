{% extends "base.html" %}

{% block content %}
    <h3 class="text-center">Edytuj przedmiot</h3>
    <form method="POST" action="{{ url_for('products.edit_item', product_id=product['id']) }}" class="grid grid-cols-12 gap-3 w-full">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="col-span-12 md:col-span-4">
            <label for="category" class="label-text">Kategoria:</label>
            <select id="category" name="category" required class="select select-bordered w-full">
                {% for cat in PRODUCT_CATEGORIES %}
                <option value="{{ cat }}" {% if product['category'] == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-span-12 md:col-span-4">
            <label for="brand" class="label-text">Marka:</label>
            <select id="brand" name="brand" class="select select-bordered w-full">
                {% for brand in PRODUCT_BRANDS %}
                <option value="{{ brand }}" {% if product['brand'] == brand %}selected{% endif %}>{{ brand }}</option>
                {% endfor %}
                <option value="Inna" {% if product['brand'] not in PRODUCT_BRANDS %}selected{% endif %}>Inna marka</option>
            </select>
        </div>

        <div class="col-span-12 md:col-span-4">
            <label for="series" class="label-text">Seria:</label>
            <select id="series" name="series" class="select select-bordered w-full">
                <option value="">-- Brak serii --</option>
                {% for ser in PRODUCT_SERIES %}
                <option value="{{ ser }}" {% if product['series'] == ser %}selected{% endif %}>{{ ser }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-span-12 md:col-span-6">
            <label for="color" class="label-text">Kolor:</label>
            <input type="text" id="color" name="color" value="{{ product['color'] }}" class="input input-bordered w-full" required>
        </div>


        <div class="col-span-12 text-center">
            <label for="sizes" class="label-text">Ilości dla rozmiarów:</label>
        </div>
        {% for size in ALL_SIZES %}
            {% set info = product_sizes[size] %}
            <div class="col-span-12 md:col-span-6">
                <label class="label-text">Rozmiar: {{ size }}</label>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <input type="number" name="quantity_{{ size }}" value="{{ info['quantity'] }}" min="0" class="input input-bordered w-full" placeholder="Ilość">
                    </div>
                    <div>
                        <input type="text" name="barcode_{{ size }}" value="{{ info['barcode'] }}" class="input input-bordered w-full" placeholder="Kod kreskowy">
                    </div>
                    <div>
                        <input type="number" name="purchase_price_{{ size }}" value="{{ info['purchase_price'] }}" step="0.01" min="0" class="input input-bordered w-full" placeholder="Cena zakupu">
                    </div>
                </div>
            </div>
        {% endfor %}

        <div class="col-span-12 text-center">
            <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
        </div>
    </form>


{% endblock %}
