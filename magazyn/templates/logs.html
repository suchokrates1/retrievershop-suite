{% extends "base.html" %}
{% block content %}
<h2 class="text-center">Logi</h2>

<div class="d-flex gap-2 mb-3 justify-content-center flex-wrap" x-data="{ level: 'all' }">
    <button class="btn btn-sm btn-outline-light" :class="{ active: level === 'all' }" @click="level = 'all'; $dispatch('log-filter', { level: 'all' })">Wszystkie</button>
    <button class="btn btn-sm btn-outline-danger" :class="{ active: level === 'ERROR' }" @click="level = 'ERROR'; $dispatch('log-filter', { level: 'ERROR' })">ERROR</button>
    <button class="btn btn-sm btn-outline-warning" :class="{ active: level === 'WARNING' }" @click="level = 'WARNING'; $dispatch('log-filter', { level: 'WARNING' })">WARNING</button>
    <button class="btn btn-sm btn-outline-info" :class="{ active: level === 'INFO' }" @click="level = 'INFO'; $dispatch('log-filter', { level: 'INFO' })">INFO</button>
    <button class="btn btn-sm btn-outline-secondary" :class="{ active: level === 'DEBUG' }" @click="level = 'DEBUG'; $dispatch('log-filter', { level: 'DEBUG' })">DEBUG</button>
</div>

<div class="log-container mx-auto" x-data="logViewer()" @log-filter.window="filterLevel = $event.detail.level; applyFilter()">
    <div class="log-content" x-ref="logContent">{{ logs|safe }}</div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('logViewer', () => ({
        filterLevel: 'all',

        init() {
            const content = this.$refs.logContent;
            const html = content.innerHTML;
            const lines = html.split('<br>');
            const colored = lines.map(line => {
                let cls = 'log-line';
                if (/\bERROR\b/.test(line)) cls += ' log-error';
                else if (/\bWARNING\b/.test(line)) cls += ' log-warning';
                else if (/\bINFO\b/.test(line)) cls += ' log-info';
                else if (/\bDEBUG\b/.test(line)) cls += ' log-debug';
                return '<div class="' + cls + '">' + line + '</div>';
            });
            content.innerHTML = colored.join('');
        },

        applyFilter() {
            const level = this.filterLevel;
            this.$refs.logContent.querySelectorAll('.log-line').forEach(el => {
                if (level === 'all') { el.style.display = ''; return; }
                el.style.display = el.classList.contains('log-' + level.toLowerCase()) ? '' : 'none';
            });
        }
    }));
});
</script>
{% endblock %}

{% block styles %}
<style>
.log-error { color: #ff6b6b; }
.log-warning { color: #ffc107; }
.log-info { color: #17a2b8; }
.log-debug { color: #6c757d; }
.log-line { padding: 1px 0; }
</style>
{% endblock %}
