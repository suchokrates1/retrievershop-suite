{% extends "base.html" %}

{% block content %}
<h2 class="mb-3 text-center">Dodaj dostawę</h2>
<form action="{{ url_for('products.add_delivery') }}" method="post" class="row g-3 w-100" x-data="deliveryForm()">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-12 text-end mb-2">
        <button type="button" @click="addRow()" class="btn btn-secondary btn-sm"><i class="bi bi-plus-circle"></i></button>
        <a href="{{ url_for('products.import_invoice') }}" class="btn btn-secondary btn-sm ms-2" title="Dostawa z faktury"><i class="bi bi-file-earmark-text"></i></a>
    </div>
    <div>
        <template x-for="(row, index) in rows" :key="index">
            <div class="delivery-row row row-cols-1 row-cols-md-2 g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">EAN (kod kreskowy):</label>
                    <input type="text" name="ean" class="form-control" placeholder="Zeskanuj lub wpisz EAN" x-model="row.ean">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Lub wybierz produkt:</label>
                    <select name="product_id" class="form-select" x-model="row.product_id">
                        <option value="">-- wybierz jeśli brak EAN --</option>
                        {% for p in products %}
                        <option value="{{ p['id'] }}">{{ p['name'] }} ({{ p['color'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Rozmiar (jeśli bez EAN):</label>
                    <select name="size" class="form-select" x-model="row.size">
                        <option value="">-- wybierz --</option>
                        {% for s in ALL_SIZES %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ilość:</label>
                    <input type="number" name="quantity" min="1" class="form-control" x-model="row.quantity">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Cena:</label>
                    <input type="number" step="0.01" name="price" class="form-control" x-model="row.price">
                </div>
                <div class="col-md-2 col-12 text-end">
                    <button type="button" class="btn btn-danger btn-sm" @click="removeRow(index)"
                            x-show="rows.length > 1"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </template>
    </div>
    <div class="col-12 form-actions text-center">
        <button type="submit" class="btn btn-primary">Dodaj</button>
    </div>
</form>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('deliveryForm', () => ({
        rows: [{ ean: '', product_id: '', size: '', quantity: 1, price: 0 }],

        addRow() {
            this.rows.push({ ean: '', product_id: '', size: '', quantity: 1, price: 0 });
        },

        removeRow(index) {
            if (this.rows.length > 1) {
                this.rows.splice(index, 1);
            }
        }
    }));
});
</script>
{% endblock %}
