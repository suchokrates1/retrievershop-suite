{% extends "base.html" %}

{% block content %}
<h2 class="mb-3 text-center">Dodaj dostawę</h2>
<form action="{{ url_for('products.add_delivery') }}" method="post" class="grid grid-cols-12 gap-3 w-full" x-data="deliveryForm()">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-span-12 text-right mb-2">
        <button type="button" @click="addRow()" class="btn btn-neutral btn-sm"><i class="bi bi-plus-circle"></i></button>
        <a href="{{ url_for('products.import_invoice') }}" class="btn btn-neutral btn-sm ml-2" title="Dostawa z faktury"><i class="bi bi-file-earmark-text"></i></a>
    </div>
    <div>
        <template x-for="(row, index) in rows" :key="index">
            <div class="delivery-row grid grid-cols-12 gap-3 items-end">
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">EAN (kod kreskowy):</label>
                    <input type="text" name="ean" class="input input-bordered w-full" placeholder="Zeskanuj lub wpisz EAN" x-model="row.ean">
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">Lub wybierz produkt:</label>
                    <select name="product_id" class="select select-bordered w-full" x-model="row.product_id">
                        <option value="">-- wybierz jeśli brak EAN --</option>
                        {% for p in products %}
                        <option value="{{ p['id'] }}">{{ p['name'] }} ({{ p['color'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">Rozmiar (jeśli bez EAN):</label>
                    <select name="size" class="select select-bordered w-full" x-model="row.size">
                        <option value="">-- wybierz --</option>
                        {% for s in ALL_SIZES %}
                        <option value="{{ s }}">{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-text">Ilość:</label>
                    <input type="number" name="quantity" min="1" class="input input-bordered w-full" x-model="row.quantity">
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-text">Cena:</label>
                    <input type="number" step="0.01" name="price" class="input input-bordered w-full" x-model="row.price">
                </div>
                <div class="col-span-12 md:col-span-2 text-right">
                    <button type="button" class="btn btn-error btn-sm" @click="removeRow(index)"
                            x-show="rows.length > 1"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </template>
    </div>
    <div class="col-span-12 form-actions text-center">
        <button type="submit" class="btn btn-primary">Dodaj</button>
    </div>
</form>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('deliveryForm', () => ({
        rows: [{ ean: '', product_id: '', size: '', quantity: 1, price: 0 }],

        addRow() {
            this.rows.push({ ean: '', product_id: '', size: '', quantity: 1, price: 0 });
        },

        removeRow(index) {
            if (this.rows.length > 1) {
                this.rows.splice(index, 1);
            }
        }
    }));
});
</script>
{% endblock %}
