name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Testy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zaleznosci
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Uruchomienie testow
        env:
          DB_PATH: /tmp/test_magazyn.db
          SECRET_KEY: test-ci-key
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest magazyn/tests/ -q --tb=line -m "not e2e"

  build_image:
    name: Build i push GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Ustaw Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build i push obrazu
        uses: docker/build-push-action@v6
        with:
          context: .
          file: magazyn/Dockerfile
          push: true
          tags: |
            ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:latest
            ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:${{ github.sha }}

  deploy:
    name: Deploy na minipc
    needs: build_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Polaczenie Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy przez SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd /home/suchokrates1/retrievershop-suite
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export MAGAZYN_IMAGE_TAG=latest
            docker compose pull magazyn_app
            docker compose up -d magazyn_app

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            sleep 30
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' retrievershop-magazyn 2>/dev/null || echo "unknown")
            echo "Health status: $STATUS"
            if [ "$STATUS" != "healthy" ]; then
              echo "UWAGA: kontener nie jest healthy po 30s, sprawdzam logi..."
              docker logs --tail 30 retrievershop-magazyn
              exit 1
            fi
            echo "Deploy OK - kontener healthy"

      - name: Sync image do VPS failover
        uses: appleboy/ssh-action@v1
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3m
          script: |
            docker save ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:latest | gzip | \
              ssh -p 10136 -i ~/.ssh/vps_mikrus -o StrictHostKeyChecking=no \
              suchokrates1@robert136.mikrus.xyz \
              'gunzip | docker load 2>&1 | tail -3 && echo "VPS image updated"'
