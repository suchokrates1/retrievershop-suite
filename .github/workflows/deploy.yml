name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Testy jednostkowe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zaleznosci
        run: |
          pip install -r requirements-dev.txt

      - name: Uruchomienie testow
        env:
          DB_PATH: /tmp/test_magazyn.db
          SECRET_KEY: test-ci-key
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest magazyn/tests/ -q --tb=line -m "not e2e and not production" --ignore=magazyn/tests/e2e

  e2e:
    name: Testy E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zaleznosci
        run: |
          pip install -r requirements-dev.txt
          playwright install --with-deps chromium

      - name: Uruchomienie testow E2E
        env:
          DB_PATH: /tmp/test_magazyn_e2e.db
          SECRET_KEY: test-ci-e2e-key
          CI: "true"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest \
            magazyn/tests/e2e/ \
            magazyn/tests/test_stocktake_ui.py \
            -m e2e \
            --browser chromium \
            -q --tb=short

  build_image:
    name: Build i push GHCR
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Ustaw Buildx
        uses: docker/setup-buildx-action@v4

      - name: Logowanie do GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build i push obrazu
        uses: docker/build-push-action@v7
        with:
          context: .
          file: magazyn/Dockerfile
          push: true
          tags: |
            ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:latest
            ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:${{ github.sha }}

  deploy:
    name: Deploy na minipc
    needs: build_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Polaczenie Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Backup bazy przed deployem
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            set -euo pipefail
            BACKUP_DIR="$HOME/backup/pre-deploy"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            echo "Tworze backup produkcyjnej bazy przed deployem -> $BACKUP_FILE"
            if docker ps --format '{{.Names}}' | grep -qx retrievershop-magazyn; then
              if docker exec retrievershop-magazyn test -f /app/scripts/ops/refresh_allegro_token.py 2>/dev/null; then
                echo "Odswiezam token Allegro przed backupem..."
                docker exec retrievershop-magazyn python3 /app/scripts/ops/refresh_allegro_token.py \
                  || echo "UWAGA: odswiezenie tokenu Allegro nie powiodlo sie - backup kontynuowany"
              else
                echo "Pomijam odswiezenie tokenu (skrypt jeszcze nie w obrazie - pierwszy deploy po aktualizacji)"
              fi
            fi
            docker exec retrievershop-postgres pg_dump -U magazyn -d magazyn --clean --if-exists \
              | gzip > "$BACKUP_FILE"
            SIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1000 ]; then
              echo "BLAD: backup wyglada na pusty/zepsuty (rozmiar=$SIZE bajtow) - przerywam deploy!"
              rm -f "$BACKUP_FILE"
              exit 1
            fi
            echo "Backup OK ($SIZE bajtow)"
            # Retencja: zachowaj tylko 20 najnowszych backupow pre-deploy
            cd "$BACKUP_DIR" && ls -t pre-deploy-*.sql.gz 2>/dev/null | tail -n +21 | xargs -r rm --

      - name: Deploy przez SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd /home/suchokrates1/retrievershop-suite
            git fetch origin main
            git pull --ff-only origin main || echo "UWAGA: git pull nieudany, kontynuuje deploy obrazu"
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export MAGAZYN_IMAGE_TAG=latest
            docker compose pull magazyn_app
            docker compose up -d magazyn_app

      - name: Health check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3m
          script: |
            check_container_health() {
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' retrievershop-magazyn 2>/dev/null || echo "unknown")
              echo "Health status: $STATUS"
              [ "$STATUS" = "healthy" ]
            }

            for attempt in 1 2 3; do
              echo "Health check attempt ${attempt}/3..."
              sleep 30
              if check_container_health; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "UWAGA: kontener nie jest healthy po 3 probach, sprawdzam logi..."
                docker logs --tail 30 retrievershop-magazyn
                exit 1
              fi
              echo "Ponawiam za 30s..."
            done

            echo "Sprawdzam /healthz i /login..."
            curl -fsS http://127.0.0.1:8000/healthz
            LOGIN_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/login)
            if [ "$LOGIN_CODE" != "200" ]; then
              echo "Login page HTTP $LOGIN_CODE (oczekiwano 200)"
              exit 1
            fi
            echo "Deploy OK - kontener healthy, /healthz i /login odpowiadaja"

      - name: Sync image do VPS failover
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 100.110.194.46
          username: suchokrates1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 3m
          script: |
            docker save ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:latest | gzip | \
              ssh -p 10136 -i ~/.ssh/vps_mikrus -o StrictHostKeyChecking=no \
              suchokrates1@robert136.mikrus.xyz \
              'gunzip | docker load 2>&1 | tail -3 && echo "VPS image updated"'
