services:
  postgres:
    container_name: retrievershop-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magazyn
      POSTGRES_USER: magazyn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magazyn"]
      interval: 10s
      timeout: 5s
      retries: 5

  magazyn_app:
    container_name: retrievershop-magazyn
    image: ghcr.io/suchokrates1/retrievershop-suite-magazyn_app:${MAGAZYN_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: magazyn/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./.env.example:/app/.env.example:ro
      - ./agent.log:/app/agent.log
      # Mount full CUPS run dir with rshared so new sockets are visible after cupsd restarts
      - type: bind
        source: /var/run/cups
        target: /var/run/cups
        bind:
          propagation: rshared
    env_file: .env
    environment:
      - CUPS_SERVER=/var/run/cups/cups.sock
      - CDP_HOST=192.168.31.5
      - CDP_PORT=9223
    user: root
    command: ["gunicorn", "magazyn.wsgi:app", "--config", "/app/magazyn/gunicorn.conf.py"]
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.magazyn2.rule=Host(`magazyn.retrievershop.pl`)"
      - "traefik.http.routers.magazyn2.entrypoints=https"
      - "traefik.http.routers.magazyn2.tls=true"
      - "traefik.http.services.magazyn2.loadbalancer.server.port=8000"
      - "traefik.http.services.magazyn2.loadbalancer.server.scheme=http"

volumes:
  postgres_data:

networks:
  proxy:
    external: true
